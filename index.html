<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Naskah — Gerbang Nusantara</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12161A;
    --panel: #181D22;
    --panel-2: #1F262C;
    --line: #2A3238;
    --text: #EDEAE3;
    --text-dim: #9AA5AB;
    --amber: #F2A20C;
    --amber-dim: #7A5710;
    --teal: #3FA5A0;
    --red-live: #E24B3C;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;height:100vh;overflow:hidden;}
  .app{display:grid;grid-template-columns:300px 1fr;height:100vh;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0;}
  .brand{padding:20px 18px 14px;border-bottom:1px solid var(--line);}
  .brand-top{display:flex;align-items:center;gap:8px;}
  .lamp{width:9px;height:9px;border-radius:50%;background:var(--red-live);box-shadow:0 0 8px var(--red-live);}
  .lamp.busy{animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .brand-title{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--text-dim);text-transform:uppercase;}
  .brand h1{margin:6px 0 2px;font-size:19px;font-weight:800;letter-spacing:-0.01em;}
  .brand p{margin:0;font-size:12px;color:var(--text-dim);}

  .add-btn{margin:14px 18px;padding:10px 12px;background:var(--amber);color:#1A1400;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
  .add-btn:hover{background:#ffb42b;}

  .item-list{overflow-y:auto;flex:1;padding:0 10px 10px;}
  .item-card{padding:11px 12px;border-radius:9px;margin-bottom:6px;cursor:pointer;border:1px solid transparent;position:relative;}
  .item-card:hover{background:var(--panel-2);}
  .item-card.active{background:var(--panel-2);border-color:var(--amber-dim);}
  .item-card .n{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--teal);}
  .item-card .t{font-size:13px;font-weight:600;margin:3px 0 4px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .item-card .meta{display:flex;gap:6px;align-items:center;font-size:10.5px;color:var(--text-dim);}
  .status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .status-draft{background:#565f65;}
  .status-generating{background:var(--amber);animation:pulse 1s infinite;}
  .status-done{background:#4BBF7A;}
  .status-error{background:var(--red-live);}
  .empty-hint{padding:30px 18px;color:var(--text-dim);font-size:12.5px;line-height:1.6;}

  .compile-btn{margin:10px 18px 18px;padding:11px;border-radius:8px;border:1px solid var(--teal);color:var(--teal);background:transparent;font-weight:700;font-size:12.5px;cursor:pointer;}
  .compile-btn:hover{background:rgba(63,165,160,.12);}

  /* ---------- MAIN ---------- */
  .main{overflow-y:auto;padding:26px 34px 60px;}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;gap:16px;}
  .topbar h2{margin:0;font-size:20px;font-weight:800;}
  .topbar .sub{color:var(--text-dim);font-size:12.5px;margin-top:4px;}
  .del-link{color:var(--red-live);font-size:12px;background:none;border:none;cursor:pointer;padding:6px 0;}

  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin:18px 0 6px;font-weight:600;}
  input[type=text], input[type=url], textarea, select{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;color:var(--text);
    padding:10px 12px;font-family:'Sora',sans-serif;font-size:13.5px;resize:vertical;
  }
  textarea:focus, input:focus, select:focus{outline:none;border-color:var(--amber-dim);}
  textarea.raw{min-height:130px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.5;}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  .gen-btn{margin-top:18px;padding:12px 18px;background:var(--amber);color:#1A1400;border:none;border-radius:8px;font-weight:700;font-size:13.5px;cursor:pointer;}
  .gen-btn:disabled{opacity:.5;cursor:default;}
  .gen-btn:hover:not(:disabled){background:#ffb42b;}

  .err-box{margin-top:12px;padding:10px 12px;background:rgba(226,75,60,.12);border:1px solid var(--red-live);border-radius:8px;color:#ffb3ab;font-size:12.5px;}

  .sections{margin-top:26px;}
  .sec-block{margin-bottom:20px;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .sec-block:focus-within{border-color: var(--amber-dim);}
  .sec-head{padding:10px 14px;background:var(--panel-2);display:flex;align-items:center;justify-content:space-between;}
  .sec-head .tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);}
  .sec-head .hint{font-size:10.5px;color:var(--text-dim);}
  .sec-body{padding:12px 14px;}
  .sec-body textarea{border:none;background:transparent;padding:0;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.9;min-height:70px;}
  .sec-body textarea:focus{outline:none;}

  /* ---------- TELEPROMPTER / COMPILE VIEW ---------- */
  .prompter-wrap{background:#0B0E11;border-radius:12px;border:1px solid var(--line);padding:26px 30px;}
  .prompter-line{font-family:'JetBrains Mono',monospace;font-size:15px;line-height:2.05;color:#F4F1EA;}
  .prompter-line.tag-line{color:var(--amber);font-weight:700;margin-top:22px;margin-bottom:6px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;}
  .prompter-line.title-line{color:var(--teal);font-weight:700;font-size:16.5px;margin-top:26px;}
  .prompter-line.promo-line{color:#7f8a90;font-style:italic;}

  .toolbar{display:flex;gap:10px;margin-bottom:18px;}
  .toolbar button{padding:9px 14px;border-radius:7px;border:1px solid var(--line);background:var(--panel-2);color:var(--text);font-size:12.5px;cursor:pointer;font-weight:600;}
  .toolbar button:hover{border-color:var(--amber-dim);}
  .toolbar button.primary{background:var(--amber);color:#1A1400;border-color:var(--amber);}
  .toolbar button.primary:hover{background:#ffb42b;}

  .settings-panel{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:20px;}
  .settings-panel h3{margin:0 0 10px;font-size:13px;}
  .promo-toggle{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12.5px;color:var(--text-dim);}

  .empty-main{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;color:var(--text-dim);text-align:center;gap:14px;}
  .empty-main .big{font-size:44px;}
  .empty-main h3{color:var(--text);margin:0;font-size:16px;}
  .empty-main p{margin:0;font-size:13px;max-width:340px;line-height:1.6;}

  .copy-toast{position:fixed;bottom:24px;right:24px;background:#4BBF7A;color:#062011;padding:10px 16px;border-radius:8px;font-size:12.5px;font-weight:700;opacity:0;transition:opacity .25s;pointer-events:none;}
  .copy-toast.show{opacity:1;}

  ::-webkit-scrollbar{width:9px;}
  ::-webkit-scrollbar-thumb{background:#2A3238;border-radius:5px;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">
      <div class="brand-top"><span class="lamp" id="lamp"></span><span class="brand-title">On Air Script Tool</span></div>
      <h1>Gerbang Nusantara</h1>
      <p>Studio naskah — ubah berita jadi teleprompter (Gemini Free)</p>
    </div>
    <button class="add-btn" onclick="addItem()">+ Tambah Berita</button>
    <div class="item-list" id="itemList"></div>
    <button class="compile-btn" onclick="showCompile()"> Susun Naskah Lengkap</button>
  </div>
  <div class="main" id="main"></div>
</div>
<div class="copy-toast" id="toast">Disalin ke clipboard</div>

<script>
const SECTION_DEFS = [
  {key:'hoox', label:'Hoox', hint:'kalimat pembuka pemantik'},
  {key:'story', label:'Story', hint:'inti kejadian'},
  {key:'observation', label:'Observation', hint:'detail & data tambahan'},
  {key:'problem', label:'Problem', hint:'kenapa ini jadi masalah'},
  {key:'insight', label:'Insight', hint:'pelajaran dari kasus ini'},
  {key:'solusi', label:'Solusi', hint:'langkah penyelesaian'},
  {key:'benefit', label:'Benefit', hint:'dampak baik kalau ini berjalan'},
  {key:'connection', label:'Connection', hint:'kaitkan ke nilai/isu besar'},
  {key:'cta', label:'CTA', hint:'pertanyaan interaksi ke penonton'},
  {key:'reaksi', label:'Reaksi Isu', hint:'penutup renungan singkat'},
];

let state = { items: [], selectedId: null, view: 'edit', settings: null };

const DEFAULT_SETTINGS = {
  apiKey: '',
  intro: `"hai hai Selamat siang semuanya, Perkenalkan saya [Siapa] disini akan membawakan sesi live Gerbang Nusantara seperti biasa di hari sabtu jam [---] siang saat ini, di sesi live ini kita akan membahas kejadian yang terjadi dalam minggu terakhir."\n\n"Di sesi live ini kita akan membahas berbagai kejadian penting yang terjadi dalam satu minggu terakhir dari isu nasional sampai daerah, yang tentunya relevan dengan kita semua."\n\n"Dan hari ini kita akan bahas beberapa topik hangat."\n\n"Dan seperti biasa, nanti di tengah live juga akan ada info peluang kolaborasi untuk teman-teman yang stay sampai akhir."\n\n"Jadi pastikan jangan ke mana-mana… langsung kita masuk ke berita pertama."`,
  promo: `"Teman-teman, sebelum lanjut ke berita berikutnya, kami ingin menyampaikan bahwa Gerbang Nusantara saat ini terbuka untuk kerja sama dan sponsor."\n\n"Buat kalian yang punya UMKM, brand lokal, jasa atau usaha, atau kegiatan/event yang ingin dipromosikan, bisa banget tampil di live ini dan dijangkau langsung oleh audiens kami."\n\n"Formatnya bisa mention di live, review produk, atau bahkan segmen khusus."\n\n"Silakan hubungi kami melalui DM atau kontak yang ada di bio ya."\n\n"Dukung media lokal, dan mari tumbuh bersama."\n\n"Lanjut kita ke berita berikutnya."`,
  outro: `"Itu dia beberapa kejadian penting minggu ini yang sudah kita bahas bersama."\n\n"Terima kasih sudah menyimak sampai akhir, jangan lupa like, comment, dan share live ini ke teman-teman kalian."\n\n"Sampai jumpa di sesi live Gerbang Nusantara selanjutnya, tetap kritis dan sampai jumpa!"`
};

function uid(){ return Math.random().toString(36).slice(2,10); }

function blankHasil(){
  const h = {judul:''};
  SECTION_DEFS.forEach(s=>h[s.key]=[]);
  return h;
}

function newItem(){
  return {
    id: uid(), url:'', judul:'', kategori:'', raw:'',
    insertPromoAfter:false, status:'draft', error:'', hasil: blankHasil()
  };
}

function loadAll(){
  try{
    const r = localStorage.getItem('gn-items');
    state.items = r ? JSON.parse(r) : [];
  }catch(e){ state.items = []; }
  try{
    const r2 = localStorage.getItem('gn-settings');
    state.settings = r2 ? JSON.parse(r2) : {...DEFAULT_SETTINGS};
  }catch(e){ state.settings = {...DEFAULT_SETTINGS}; }
  if(state.items.length){ state.selectedId = state.items[0].id; }
  render();
}

function saveItems(){
  try{ localStorage.setItem('gn-items', JSON.stringify(state.items)); }catch(e){ console.error(e); }
}
function saveSettings(){
  try{ localStorage.setItem('gn-settings', JSON.stringify(state.settings)); }catch(e){ console.error(e); }
}

function addItem(){
  const it = newItem();
  state.items.unshift(it);
  state.selectedId = it.id;
  state.view = 'edit';
  saveItems();
  render();
}

function deleteItem(id){
  state.items = state.items.filter(i=>i.id!==id);
  if(state.selectedId===id){ state.selectedId = state.items[0]?.id || null; }
  saveItems();
  render();
}

function getItem(id){ return state.items.find(i=>i.id===id); }

function updateField(id, field, value){
  const it = getItem(id);
  if(!it) return;
  it[field] = value;
  saveItems();
}

function updateSection(id, key, text){
  const it = getItem(id);
  if(!it) return;
  it.hasil[key] = text.split('\n').map(l=>l.trim()).filter(Boolean);
  saveItems();
}

function selectItem(id){ state.selectedId = id; state.view='edit'; render(); }
function showCompile(){ state.view='compile'; render(); }
function showSettings(){ state.view='settings'; render(); }

function setLamp(busy){
  document.getElementById('lamp').classList.toggle('busy', busy);
}

// FIX UTAMA: Migrasi Total ke Google Gemini API (100% Gratis & Bebas CORS)
async function generate(id){
  const it = getItem(id);
  if(!it || !it.raw.trim()){ it.error='Tempel dulu isi/teks berita sebelum diproses.'; render(); return; }
  
  if(!state.settings.apiKey || !state.settings.apiKey.trim()){
    it.error='Gemini API Key belum diatur. Klik menu "Template & API" di kanan atas untuk memasukkan key gratis.';
    render();
    return;
  }

  it.status = 'generating'; it.error=''; render(); setLamp(true);

  const systemInstruction = `Kamu adalah penulis naskah profesional untuk sesi live streaming berita mingguan bernama "Gerbang Nusantara". Tugasmu: ubah artikel berita mentah menjadi naskah teleprompter dengan format baku JSON. JAWAB HANYA DALAM JSON VALID, TAMPILKAN JSON SAJA TANPA MARKDOWN BACKTICKS (\`\`\`json), TANPA PENJELASAN LAIN.

Format setiap section adalah ARRAY berisi potongan kalimat-kalimat lisan yang sangat pendek (3-9 kata), mengalir, santai, dan mudah dibaca per potongan frasa alami tanpa putus di tengah kalimat panjang.

Struktur JSON wajib tepat seperti ini:
{
 "judul": "judul singkat berita, gaya headline menarik",
 "hoox": ["potongan kalimat 1", "potongan 2"],
 "story": ["potongan kalimat 1", "potongan 2"],
 "observation": ["potongan kalimat 1", "potongan 2"],
 "problem": ["potongan kalimat 1", "potongan 2"],
 "insight": ["potongan kalimat 1", "potongan 2"],
 "solusi": ["potongan kalimat 1", "potongan 2"],
 "benefit": ["potongan kalimat 1", "potongan 2"],
 "connection": ["potongan kalimat 1", "potongan 2"],
 "cta": ["potongan kalimat 1", "potongan 2"],
 "reaksi": ["potongan kalimat 1", "potongan 2"]
}

Gunakan bahasa Indonesia jurnalistik lisan yang netral, faktual, dan murni berdasarkan data artikel sumber. Jangan mengarang hoax atau mengubah fakta yang tidak ada di teks sumber.`;

  const userMsg = `Judul berita saat ini: ${it.judul || 'Otomatis'}\nKategori: ${it.kategori || 'Umum'}\nIsi Teks Berita mentah:\n${it.raw}`;

  // Menggunakan model Gemini 1.5 Flash (Gratis, Cepat, dan Akurat)
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.settings.apiKey.trim()}`;

  try{
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: userMsg }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        generationConfig: {
          responseMimeType: "application/json",
          temperature: 0.3
        }
      })
    });
    
    if(!resp.ok) {
      const errData = await resp.json();
      throw new Error(errData.error?.message || 'Gemini API Error');
    }

    const data = await resp.json();
    let rawText = data.candidates[0].content.parts[0].text.trim();
    
    // Pembersihan jika model melanggar instruksi dan tetap membungkus dengan markdown
    rawText = rawText.replace(/^```json/i, '').replace(/^```/, '').replace(/```$/, '').trim();
    
    const parsed = JSON.parse(rawText);
    
    it.hasil = { judul: parsed.judul || it.judul || 'Berita Terproses' };
    SECTION_DEFS.forEach(s => { 
      it.hasil[s.key] = Array.isArray(parsed[s.key]) ? parsed[s.key] : []; 
    });
    
    if(!it.judul) it.judul = it.hasil.judul;
    it.status = 'done';
  }catch(e){
    console.error(e);
    it.status = 'error';
    it.error = 'Gagal memproses naskah dengan Gemini. Pastikan API Key Anda benar dan kuota gratis mencukupi.';
  }
  setLamp(false);
  saveItems();
  render();
}

function copyToClipboard(text){
  navigator.clipboard.writeText(text).then(()=>{
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 1600);
  });
}

function compileScript(){
  const s = state.settings;
  let lines = [];
  lines.push({type:'tag', text:'PEMBUKA'});
  (s.intro || '').split('\n').forEach(l=>{ if(l.trim()) lines.push({type:'line', text:l.trim()}); });

  state.items.forEach((it, idx)=>{
    lines.push({type:'title', text: `BERITA ${idx+1}: ${it.judul || it.hasil.judul || '(belum berjudul)'}`});
    SECTION_DEFS.forEach(s2=>{
      const arr = it.hasil[s2.key] || [];
      if(!arr.length) return;
      lines.push({type:'tag', text:s2.label});
      arr.forEach(l=> lines.push({type:'line', text:`"${l.replace(/^"|"$/g,'')}"`}));
    });
    if(it.insertPromoAfter){
      lines.push({type:'tag', text:'SELINGAN PROMOSI'});
      (s.promo || '').split('\n').forEach(l=>{ if(l.trim()) lines.push({type:'promo', text:l.trim()}); });
    }
  });

  lines.push({type:'tag', text:'PENUTUP'});
  (s.outro || '').split('\n').forEach(l=>{ if(l.trim()) lines.push({type:'line', text:l.trim()}); });
  return lines;
}

function compileScriptText(){
  return compileScript().map(l=>{
    if(l.type==='tag') return `\n[${l.text}]\n`;
    if(l.type==='title') return `\n===== ${l.text} =====\n`;
    return l.text;
  }).join('\n');
}

function render(){
  renderSidebar();
  renderMain();
}

function renderSidebar(){
  const list = document.getElementById('itemList');
  if(!state.items.length){
    list.innerHTML = `<div class="empty-hint">Belum ada berita. Klik "+ Tambah Berita" untuk mulai.</div>`;
    return;
  }
  list.innerHTML = state.items.map((it, idx)=>{
    const title = it.judul || it.hasil.judul || '(belum berjudul)';
    return `<div class="item-card ${it.id===state.selectedId && state.view==='edit' ? 'active':''}" onclick="selectItem('${it.id}')">
      <div class="n">BERITA ${idx+1}${it.kategori ? ' · '+escapeHtml(it.kategori) : ''}</div>
      <div class="t">${escapeHtml(title)}</div>
      <div class="meta"><span class="status-dot status-${it.status}"></span>${statusLabel(it.status)}</div>
    </div>`;
  }).join('');
}

function statusLabel(s){
  return {draft:'Draft', generating:'Memproses…', done:'Siap', error:'Gagal'}[s] || s;
}

function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderMain(){
  const main = document.getElementById('main');
  if(state.view==='settings'){ renderSettings(main); return; }
  if(state.view==='compile'){ renderCompile(main); return; }

  const it = getItem(state.selectedId);
  if(!it){
    main.innerHTML = `<div class="empty-main">
      <div class="big">🎙️</div>
      <h3>Belum ada berita dipilih</h3>
      <p>Tambahkan berita dari sidebar, tempel tulisan berita Anda, lalu dapatkan naskah teleprompter instan gratis dengan Gemini AI.</p>
      <div class="toolbar"><button class="primary" onclick="showSettings()">Atur Template & Gemini API Key</button></div>
    </div>`;
    return;
  }

  main.innerHTML = `
    <div class="topbar">
      <div>
        <h2>Edit Berita</h2>
        <div class="sub">Ubah artikel mentah menjadi gaya baca berita presenter TV.</div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="del-link" onclick="showSettings()">Template & API</button>
        <button class="del-link" onclick="deleteItem('${it.id}')">Hapus berita ini</button>
      </div>
    </div>

    <label>Link berita (opsional)</label>
    <input type="url" placeholder="https://..." value="${escapeHtml(it.url)}" oninput="updateField('${it.id}','url',this.value)">

    <div class="row2">
      <div>
        <label>Judul (opsional)</label>
        <input type="text" placeholder="Judul berita" value="${escapeHtml(it.judul)}" oninput="updateField('${it.id}','judul',this.value)">
      </div>
      <div>
        <label>Kategori / topik</label>
        <input type="text" placeholder="mis. Berita Daerah" value="${escapeHtml(it.kategori)}" oninput="updateField('${it.id}','kategori',this.value)">
      </div>
    </div>

    <label>Tempel isi artikel di sini</label>
    <textarea class="raw" placeholder="Salin isi teks berita lengkap di sini..." oninput="updateField('${it.id}','raw',this.value)">${escapeHtml(it.raw)}</textarea>

    <div class="promo-toggle">
      <input type="checkbox" id="promo-${it.id}" ${it.insertPromoAfter?'checked':''} onchange="updateField('${it.id}','insertPromoAfter',this.checked)">
      <label for="promo-${it.id}" style="margin:0;text-transform:none;font-weight:400;color:var(--text-dim);">Sisipkan segmen "Selingan Promosi" setelah berita ini</label>
    </div>

    <button class="gen-btn" ${it.status==='generating'?'disabled':''} onclick="generate('${it.id}')">
      ${it.status==='generating' ? '⏳ Sedang Meracik Naskah...' : (it.status==='done' ? '🔁 Regenerasi Naskah' : 'Ubah ke Naskah')}
    </button>

    ${it.error ? `<div class="err-box">${escapeHtml(it.error)}</div>` : ''}

    ${it.status==='done' ? renderSections(it) : ''}
  `;
}

function renderSections(it){
  return `<div class="sections">
    ${SECTION_DEFS.map(s=>{
      const arr = it.hasil[s.key]||[];
      return `<div class="sec-block">
        <div class="sec-head"><span class="tag">${s.label}</span><span class="hint">${s.hint}</span></div>
        <div class="sec-body">
          <textarea rows="${Math.max(3, arr.length)}" oninput="updateSection('${it.id}','${s.key}',this.value); autoGrow(this)" onfocus="autoGrow(this)">${arr.map(l=>escapeHtml(l)).join('\n')}</textarea>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function autoGrow(el){ el.style.height='auto'; el.style.height = el.scrollHeight+'px'; }

function renderSettings(main){
  const s = state.settings;
  main.innerHTML = `
    <div class="topbar">
      <div><h2>Pengaturan & API Google Gemini</h2><div class="sub">Gunakan Gemini API Key gratis untuk menghindari error CORS browser.</div></div>
      <button class="del-link" onclick="state.view='edit';render()">← Kembali</button>
    </div>
    <div class="settings-panel">
      <h3>Google Gemini API Key (Gratis)</h3>
      <input type="password" style="font-family:'JetBrains Mono',monospace;font-size:12.5px;" placeholder="AIzaSy..." value="${escapeHtml(s.apiKey)}" oninput="state.settings.apiKey=this.value; saveSettings();">
      <small style="color:var(--text-dim); display:block; margin-top:5px;">Kunci disimpan aman secara lokal di browser Anda pribadi. Dapatkan gratis di <a href="[https://aistudio.google.com/](https://aistudio.google.com/)" target="_blank" style="color:var(--amber);">Google AI Studio</a>.</small>
    </div>
    <div class="settings-panel">
      <h3>Pembuka Sesi Live</h3>
      <textarea rows="8" style="font-family:'JetBrains Mono',monospace;font-size:12.5px;" oninput="state.settings.intro=this.value; saveSettings();">${escapeHtml(s.intro)}</textarea>
    </div>
    <div class="settings-panel">
      <h3>Selingan Promosi</h3>
      <textarea rows="8" style="font-family:'JetBrains Mono',monospace;font-size:12.5px;" oninput="state.settings.promo=this.value; saveSettings();">${escapeHtml(s.promo)}</textarea>
    </div>
    <div class="settings-panel">
      <h3>Penutup Sesi Live</h3>
      <textarea rows="6" style="font-family:'JetBrains Mono',monospace;font-size:12.5px;" oninput="state.settings.outro=this.value; saveSettings();">${escapeHtml(s.outro)}</textarea>
    </div>
  `;
}

function renderCompile(main){
  const lines = compileScript();
  main.innerHTML = `
    <div class="topbar">
      <div><h2>Naskah Lengkap</h2><div class="sub">Siap dibaca langsung atau disalin ke perangkat teleprompter Anda.</div></div>
      <button class="del-link" onclick="state.view='edit';render()">← Kembali</button>
    </div>
    <div class="toolbar">
      <button class="primary" onclick="copyToClipboard(compileScriptText())">📋 Salin Semua</button>
      <button onclick="downloadScript()">⬇ Unduh .txt</button>
      <button onclick="showSettings()">⚙️ Edit Template</button>
    </div>
    <div class="prompter-wrap">
      ${lines.map(l=>{
        if(l.type==='tag') return `<div class="prompter-line tag-line">${escapeHtml(l.text)}</div>`;
        if(l.type==='title') return `<div class="prompter-line title-line">${escapeHtml(l.text)}</div>`;
        if(l.type==='promo') return `<div class="prompter-line promo-line">${escapeHtml(l.text)}</div>`;
        return `<div class="prompter-line">${escapeHtml(l.text)}</div>`;
      }).join('')}
    </div>
  `;
}

function downloadScript(){
  const blob = new Blob([compileScriptText()], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'naskah-live-gerbang-nusantara.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

loadAll();
</script>
</body>
</html>
